# sodaprompts.yml — project config for Soda Prompts
# Generated by /sodaprompts-setup. Committed to the repo so the remote
# agent knows how to work with this project.

# Base branch to fork from and PR into
base_branch: main

# Commands — the agent runs these on the Sprite
test: pnpm test
dev: pnpm dev --port 8080 --hostname 0.0.0.0
format: pnpm prettier --write
lint: pnpm lint
build: pnpm build

# Notification provider
notifications: telegram

# Builder sprite name
sprite: soda-base

# Commands to run after bootstrap (install deps, seed data, etc.)
post_bootstrap:
  - pnpm install

# Project-specific MCP servers for the sprite
# (Telegram + Context7 are always included automatically)
# Secrets use "from-env" — actual values come from .env files pushed during setup
mcp_servers: {}

# Network egress policy — restricts outbound connections from the Sprite.
# Applied via Sprites REST API (POST /v1/sprites/{name}/policy/network)
# after bootstrap and re-applied on every startup by the runner scripts.
#
# Rules are ordered. Each entry becomes {"action":"allow","domain":"..."}
# in the API payload. A deny-all rule is appended automatically to block
# everything not explicitly listed.
#
# Sprites also support preset rule bundles via {"include":"preset-name"}.
# The "llm" preset covers common AI provider domains. If unsure which
# presets exist, omit it and list domains explicitly.
#
# Omit network_policy entirely to leave egress unrestricted (default).
# API ref: https://sprites.dev/api/sprites/policies
network_policy:
  # Optional: include a preset bundle (e.g. "llm" for AI provider domains)
  # preset: llm
  allow:
    # Git + GitHub API
    - github.com
    - "*.github.com"
    - "*.githubusercontent.com"
    # Agent auth (Claude, Codex)
    - "*.anthropic.com"
    - "*.openai.com"
    # Notifications
    - api.telegram.org
    # Package registries (needed for env-reset dep reinstall)
    - "*.npmjs.org"
    - registry.npmjs.org

# --- Reviewer Sprite (optional) ---
# Added by /sodaprompts-setup when user opts in to automated PR review.
# If absent, only the Doer sprite runs (no auto-review).

# reviewer:
#   sprite: soda-reviewer          # name of the reviewer sprite
#   agent_runtime: claude           # "claude" or "codex"
#   max_rounds: 3                   # review rounds before auto-approve
#   poll_interval: 60               # seconds between polls
