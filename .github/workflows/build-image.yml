# Build and push the openthrottle Docker image to GHCR.
#
# Triggers on pushes to main that touch the daytona/ directory,
# and on manual dispatch. Tags with :latest and the short SHA.

name: Build Image

on:
  push:
    branches: [main]
    paths: [daytona/**]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/openthrottle

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/lib/node_modules /usr/share/swift /opt/hostedtoolcache
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli \
            google-cloud-cli microsoft-edge-stable google-chrome-stable firefox mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: daytona
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
