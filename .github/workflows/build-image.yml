# Build and push the openthrottle Docker image to Docker Hub.
#
# Triggers on pushes to main that touch runtime files,
# and on manual dispatch. Tags with :v1 (stable) and the commit SHA.
#
# Required repository secrets:
#   DOCKERHUB_USERNAME — Docker Hub username
#   DOCKERHUB_TOKEN    — Docker Hub access token

name: Build Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - entrypoint.sh
      - run-builder.sh
      - run-reviewer.sh
      - agent-lib.sh
      - task-adapter.sh
      - hooks/**
      - git-hooks/**
      - skills/**/SKILL.md
  workflow_dispatch:

permissions:
  contents: read

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/openthrottle

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
            /usr/local/share/boost /usr/local/graalvm /usr/local/share/chromium \
            /usr/local/lib/node_modules /usr/share/swift /opt/hostedtoolcache
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' '^llvm-.*' 'php.*' azure-cli \
            google-cloud-cli microsoft-edge-stable google-chrome-stable firefox mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo docker image prune -af
          df -h /

      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:v1
            ${{ env.IMAGE }}:${{ github.sha }}
