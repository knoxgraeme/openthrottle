# openthrottle.yml — project config for Open Throttle (Daytona runtime)
# Generated by `npx create-openthrottle` or `/openthrottle-setup`.
# Committed to the repo so the sandbox knows how to work with this project.

# Base branch to fork from and PR into
base_branch: main

# Commands — the entrypoint wires these into agent hooks
test: pnpm test
dev: pnpm dev --port 8080 --hostname 0.0.0.0
format: pnpm prettier --write
lint: pnpm lint
build: pnpm build

# Notification provider
notifications: telegram

# Agent runtime: claude | codex | aider
agent: claude

# Daytona snapshot name (created during onboarding)
snapshot: openthrottle

# Commands to run after clone (install deps, seed data, etc.)
post_bootstrap:
  - pnpm install

# Project-specific MCP servers for the sandbox
# (Telegram + Context7 are always included automatically)
# Secrets use "from-env" — actual values come from env vars at sandbox creation
mcp_servers: {}
  # Example:
  # supabase:
  #   command: npx
  #   args: ["-y", "@supabase/mcp-server"]
  #   env:
  #     SUPABASE_ACCESS_TOKEN: from-env

# --- Agent limits (optional) ---
# Safety caps to prevent runaway agents.
limits:
  max_turns: 200          # Max agentic turns per invocation (works with all auth methods)
  max_budget_usd: 5.00    # Max USD spend per invocation (API only — ignored with OAuth)
  task_timeout: 7200      # Wall-clock timeout in seconds (builder default: 7200, reviewer: 1800)

# --- Review config (optional) ---
# Controls automated PR review behavior.
review:
  enabled: true
  max_rounds: 3
